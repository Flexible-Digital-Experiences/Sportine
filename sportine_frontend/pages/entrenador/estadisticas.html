  <style>
    /* ── Bottom sheet detalle alumno ── */
    .sp-hero {
      background: linear-gradient(135deg, #1ea1db 0%, #0d7ab8 60%, #00A896 100%);
      border-radius: 20px; padding: 20px 18px 22px; margin-bottom: 16px;
      color: #fff; position: relative; overflow: hidden;
    }
    .sp-hero::before {
      content:''; position:absolute; top:-40px; right:-40px;
      width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,0.08);
    }
    .sp-hero-label { font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:600;
      letter-spacing:0.08em; text-transform:uppercase; opacity:0.75; margin-bottom:2px; }
    .sp-hero-title { font-family:'Sora',sans-serif; font-size:1.7rem; font-weight:800;
      line-height:1; margin-bottom:16px; position:relative; z-index:1; }
    .sp-hero-metrics { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; position:relative; z-index:1; }
    .sp-hero-metric { background:rgba(255,255,255,0.15); border-radius:12px; padding:10px 8px;
      backdrop-filter:blur(8px); text-align:center; }
    .sp-hero-metric-num { font-family:'Sora',sans-serif; font-size:1.4rem; font-weight:800;
      line-height:1; display:block; }
    .sp-hero-metric-label { font-family:'DM Sans',sans-serif; font-size:0.68rem; opacity:0.8;
      margin-top:3px; display:block; }
    .sp-secondary-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .sp-mini-card { background:#F9FAFB; border-radius:14px; padding:14px;
      display:flex; flex-direction:column; gap:3px; }
    .sp-mini-card-icon { font-size:1.2rem; margin-bottom:2px; }
    .sp-mini-card-num { font-family:'Sora',sans-serif; font-size:1.3rem; font-weight:800;
      color:#1A1A1A; line-height:1; }
    .sp-mini-card-label { font-family:'DM Sans',sans-serif; font-size:0.72rem; color:#9CA3AF; }
    .sp-section-label { font-family:'Sora',sans-serif; font-size:0.9rem; font-weight:700;
      color:#1A1A1A; margin:0 0 10px 2px; }
    .sp-chart-card { background:#fff; border-radius:16px; padding:16px 14px 12px;
      border:1px solid #E5E7EB; margin-bottom:16px; }
    .sp-period-row { display:flex; gap:8px; margin-bottom:12px; }
    .sp-period-btn { flex:1; padding:7px 0; border:1.5px solid #E5E7EB; border-radius:10px;
      background:#fff; font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:600;
      color:#6B7280; cursor:pointer; transition:all 0.18s; }
    .sp-period-btn.active { background:#1ea1db; border-color:#1ea1db; color:#fff; }
    .sp-donut-wrap { display:flex; align-items:center; gap:14px; }
    .sp-donut-canvas-wrap { flex:0 0 140px; max-width:140px; }
    .sp-donut-legend { flex:1; display:flex; flex-direction:column; gap:8px; }
    .sp-legend-item { display:flex; align-items:center; gap:8px; }
    .sp-legend-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .sp-legend-name { font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:600;
      color:#374151; display:block; }
    .sp-legend-pct { font-family:'Sora',sans-serif; font-size:0.7rem; color:#9CA3AF; }
  </style>
</head>
