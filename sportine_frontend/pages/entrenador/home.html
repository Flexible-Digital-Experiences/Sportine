<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportine – Home Entrenador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/base/variables.css" />
  <link rel="stylesheet" href="../../css/pages/home.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="../../index.html" class="logo-link">
        <div class="logo-mark">S</div>
        <span class="logo-text">Sportine</span>
      </a>
    </div>

    <nav class="sidebar-nav">
      <a href="home.html" class="nav-item active" data-section="home">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </span>
        <span class="nav-label">Home</span>
      </a>
      <a href="solicitudes.html" class="nav-item" data-section="solicitudes">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="23" y2="12"/><line x1="23" y1="8" x2="19" y2="12"/></svg>
        </span>
        <span class="nav-label">Solicitudes</span>
      </a>
      <a href="estadisticas.html" class="nav-item" data-section="estadisticas">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </span>
        <span class="nav-label">Estadísticas</span>
      </a>
      <a href="social.html" class="nav-item" data-section="social">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        <span class="nav-label">Social</span>
      </a>
      <a href="perfil.html" class="nav-item" data-section="perfil">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <span class="nav-label">Perfil</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-chip-avatar" id="sidebar-avatar"></div>
        <div class="user-chip-info">
          <span class="user-chip-name" id="sidebar-name"></span>
          <span class="user-chip-role">Entrenador</span>
        </div>
        <button class="logout-btn" id="btn-logout" title="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- Topbar mobile -->
    <header class="topbar">
      <button class="topbar-menu" id="topbar-menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-logo">
        <div class="logo-mark">S</div>
        <span class="logo-text">Sportine</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button id="btn-feedback-bell" style="background:none;border:none;cursor:pointer;position:relative;padding:4px;display:flex;align-items:center;justify-content:center">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span id="feedback-badge" style="display:none;position:absolute;top:0;right:0;width:8px;height:8px;background:#dc2626;border-radius:50%"></span>
        </button>
        <div class="topbar-avatar" id="topbar-avatar"></div>
      </div>
    </header>

    <section class="greeting-section">
      <div class="greeting-left">
        <div class="greeting-text">
          <p class="greeting-sub" id="greeting-sub"></p>
          <h1 class="greeting-name" id="greeting-name"></h1>
        </div>
        <div class="date-pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="greeting-date"></span>
        </div>
      </div>

      <!-- Campanita desktop -->
      <button id="btn-feedback-bell-desktop" style="background:#fff;border:1.5px solid #E5E7EB;border-radius:14px;cursor:pointer;position:relative;padding:10px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:all 0.18s ease;align-self:flex-start">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span style="font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;color:#6B7280">Feedback</span>
        <span id="feedback-badge-desktop" style="display:none;position:absolute;top:-4px;right:-4px;width:10px;height:10px;background:#dc2626;border-radius:50%;border:2px solid #fff"></span>
      </button>
    </section>


    <!-- Mis alumnos -->
    <section class="entrenamientos-section">
      <div class="section-header-row">
        <h2 class="section-title">Mis Alumnos</h2>
        <span class="section-count" id="alumnos-count"></span>
      </div>
      <div class="alumnos-list" id="lista-alumnos">
        <!-- Generado por JS -->
      </div>
    </section>

  </main>

  <!-- BOTTOM NAV mobile -->
  <nav class="bottom-nav">
    <a href="home.html" class="bn-item active" data-section="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="solicitudes.html" class="bn-item" data-section="solicitudes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="23" y2="12"/><line x1="23" y1="8" x2="19" y2="12"/></svg>
      <span>Solicitudes</span>
    </a>
    <a href="estadisticas.html" class="bn-item" data-section="estadisticas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Stats</span>
    </a>
    <a href="social.html" class="bn-item" data-section="social">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Social</span>
    </a>
    <a href="perfil.html" class="bn-item" data-section="perfil">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Perfil</span>
    </a>
  </nav>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <script src="../../js/api/api.js"></script>
  <script src="../../js/pages/entrenador/home.js"></script>
</body>
</html>
