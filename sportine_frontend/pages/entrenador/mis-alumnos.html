<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportine – Mis Alumnos</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <!-- Reutiliza los mismos CSS del proyecto -->

  <link rel="stylesheet" href="../../css/pages/entrenador.css" />

  <style>
    /* ── Filtro banner PayPal ── */
    .paypal-banner {
      background: #FFF7ED;
      border: 1px solid #FED7AA;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
      display: none;
      align-items: flex-start;
      gap: 12px;
    }
    .paypal-banner.visible { display: flex; }
    .paypal-banner-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: #FED7AA;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
    }
    .paypal-banner-text { flex: 1; }
    .paypal-banner-title {
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 0.85rem;
      color: #92400E; margin: 0 0 2px;
    }
    .paypal-banner-sub {
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
      color: #B45309; margin: 0;
    }
    .paypal-banner-btn {
      margin-top: 10px; width: 100%; padding: 9px 0;
      background: #003087; color: #fff; border: none;
      border-radius: 10px; font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 0.85rem; cursor: pointer;
    }

    /* ── Toolbar filtro ── */
    .filter-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .filter-row h2 {
      font-family: 'Sora', sans-serif; font-size: 1.3rem; font-weight: 800;
      color: #1A1A1A; margin: 0;
    }
    .btn-filtro-pendientes {
      display: flex; align-items: center; gap: 6px;
      background: none; border: 1.5px solid #EF4444;
      border-radius: 20px; padding: 6px 14px;
      font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.8rem;
      color: #EF4444; cursor: pointer; transition: all 0.18s;
    }
    .btn-filtro-pendientes.active {
      background: #EF4444; color: #fff;
    }
    .btn-filtro-pendientes svg { width: 14px; height: 14px; }

    /* ── Tarjeta alumno ── */
    .alumno-card {
      background: #fff; border: 1px solid #E5E7EB;
      border-radius: 16px; padding: 14px 16px;
      margin-bottom: 12px; display: flex; align-items: center;
      gap: 14px; cursor: pointer;
      transition: box-shadow 0.18s, transform 0.18s;
      text-decoration: none; color: inherit;
    }
    .alumno-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
    .alumno-avatar-wrap { position: relative; flex-shrink: 0; }
    .alumno-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      object-fit: cover; background: #E3F2FD;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 700; color: #2196F3;
    }
    .alumno-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .estado-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid #fff;
    }
    .estado-dot.activo { background: #16A34A; }
    .estado-dot.pendiente { background: #F59E0B; }
    .estado-dot.vencido { background: #EF4444; }

    .alumno-info { flex: 1; min-width: 0; }
    .alumno-nombre {
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 0.95rem;
      color: #1A1A1A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .alumno-meta {
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
      color: #6B7280; margin-top: 2px;
    }
    .alumno-deportes {
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
      color: #2196F3; margin-top: 4px; font-weight: 600;
    }
    .alumno-arrow { color: #D1D5DB; font-size: 1.2rem; }

    /* ── Estado vacío ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      display: none; flex-direction: column; align-items: center;
    }
    .empty-state.visible { display: flex; }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
    .empty-title {
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1rem;
      color: #6B7280; margin-bottom: 6px;
    }
    .empty-sub {
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
      color: #9CA3AF;
    }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, #F3F4F6 25%, #E5E7EB 50%, #F3F4F6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card {
      background: #fff; border: 1px solid #E5E7EB; border-radius: 16px;
      padding: 14px 16px; margin-bottom: 12px; display: flex; gap: 14px; align-items: center;
    }
    .skel-avatar { width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0; }
    .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .skel-line { height: 12px; }

    /* ── Badge estado ── */
    .estado-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .estado-badge.activo { background: #DCFCE7; color: #15803D; }
    .estado-badge.pendiente { background: #FEF3C7; color: #B45309; }
    .estado-badge.vencido { background: #FEE2E2; color: #B91C1C; }
  </style>
</head>

      <!-- Skeletons mientras carga -->
