<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportine – Home Alumno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/base/variables.css" />
  <link rel="stylesheet" href="../../css/pages/home.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="../../index.html" class="logo-link">
        <div class="logo-mark">S</div>
        <span class="logo-text">Sportine</span>
      </a>
    </div>

    <nav class="sidebar-nav">
      <a href="home.html" class="nav-item active" data-section="home">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </span>
        <span class="nav-label">Home</span>
      </a>
      <a href="buscar.html" class="nav-item" data-section="buscar">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </span>
        <span class="nav-label">Buscar entrenador</span>
      </a>
      <a href="estadisticas.html" class="nav-item" data-section="estadisticas">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </span>
        <span class="nav-label">Estadísticas</span>
      </a>
      <a href="social.html" class="nav-item" data-section="social">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        <span class="nav-label">Social</span>
        <span class="nav-badge">3</span>
      </a>
      <a href="perfil.html" class="nav-item" data-section="perfil">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <span class="nav-label">Perfil</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-chip-avatar" id="sidebar-avatar">C</div>
        <div class="user-chip-info">
          <span class="user-chip-name" id="sidebar-name">Carlos Ramírez</span>
          <span class="user-chip-role">Alumno</span>
        </div>
        <button class="logout-btn" id="btn-logout" title="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- Topbar mobile -->
    <header class="topbar">
      <button class="topbar-menu" id="topbar-menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-logo">
        <div class="logo-mark">S</div>
        <span class="logo-text">Sportine</span>
      </div>
      <div class="topbar-avatar" id="topbar-avatar">C</div>
    </header>

    <!-- Greeting -->
    <section class="greeting-section">
      <div class="greeting-left">
        <div class="greeting-text">
          <p class="greeting-sub" id="greeting-sub">Buenos días ☀️</p>
          <h1 class="greeting-name" id="greeting-name">Carlos Ramírez</h1>
        </div>
        <div class="date-pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="greeting-date">Jueves, 13 Mar 2025</span>
        </div>
      </div>
      <div class="greeting-stats">
        <div class="mini-stat">
          <span class="mini-stat-num">7</span>
          <span class="mini-stat-label">🔥 Racha</span>
        </div>
        <div class="mini-stat-divider"></div>
        <div class="mini-stat">
          <span class="mini-stat-num">23</span>
          <span class="mini-stat-label">Total</span>
        </div>
        <div class="mini-stat-divider"></div>
        <div class="mini-stat">
          <span class="mini-stat-num">3</span>
          <span class="mini-stat-label">Este mes</span>
        </div>
      </div>
    </section>

    <!-- Progreso semanal -->
    <section class="weekly-progress">
      <div class="wp-header">
        <span class="wp-title">Progreso semanal</span>
        <span class="wp-detail">4 / 6 sesiones</span>
      </div>
      <div class="wp-bar-wrap">
        <div class="wp-bar"><div class="wp-fill" style="width:66%"></div></div>
        <span class="wp-pct">66%</span>
      </div>
      <div class="wp-days">
        <div class="wp-day done"><span>L</span><div class="wp-dot"></div></div>
        <div class="wp-day done"><span>M</span><div class="wp-dot"></div></div>
        <div class="wp-day done"><span>M</span><div class="wp-dot"></div></div>
        <div class="wp-day"><span>J</span><div class="wp-dot"></div></div>
        <div class="wp-day done"><span>V</span><div class="wp-dot"></div></div>
        <div class="wp-day rest"><span>S</span><div class="wp-dot"></div></div>
        <div class="wp-day rest"><span>D</span><div class="wp-dot"></div></div>
      </div>
    </section>

    <!-- Entrenamientos -->
    <section class="entrenamientos-section">
      <div class="section-header-row">
        <h2 class="section-title">Mis Entrenamientos</h2>
        <span class="section-count" id="entreno-count">3 asignados</span>
      </div>
      <div class="entrenamientos-list" id="lista-entrenamientos">
        <!-- Generado por JS -->
      </div>
    </section>

  </main>

  <!-- BOTTOM NAV mobile -->
  <nav class="bottom-nav">
    <a href="home.html" class="bn-item active" data-section="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="buscar.html" class="bn-item" data-section="buscar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Buscar</span>
    </a>
    <a href="estadisticas.html" class="bn-item" data-section="estadisticas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Stats</span>
    </a>
    <a href="social.html" class="bn-item" data-section="social">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Social</span>
    </a>
    <a href="perfil.html" class="bn-item" data-section="perfil">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Perfil</span>
    </a>
  </nav>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <script src="../../js/pages/alumno/home.js"></script>
</body>
</html>
