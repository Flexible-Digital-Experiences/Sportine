    <div class="topbar-avatar">C</div>

  <!-- Toolbar con volver -->

    <button onclick="history.back()" style="width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid #E5E7EB;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.06)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>

  <!-- Search -->

  <a href="social.html" class="bn-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Social</span></a>
  <a href="perfil.html" class="bn-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></a>
</nav>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<script>
var MOCK_USUARIOS = [
  { id:1, nombre:'Juan Pérez',     username:'@juan_p',    iniciales:'JP', deporte:'⚽ Fútbol',    agregado:false },
  { id:2, nombre:'Ana Torres',     username:'@ana_t',     iniciales:'AT', deporte:'🏊 Natación',  agregado:true  },
  { id:3, nombre:'Luis Martínez',  username:'@luis_m',    iniciales:'LM', deporte:'🏋️ Pesas',    agregado:false },
  { id:4, nombre:'Sofía Gómez',    username:'@sofia_g',   iniciales:'SG', deporte:'🚴 Ciclismo', agregado:false },
  { id:5, nombre:'Miguel Ángel',   username:'@miguel_a',  iniciales:'MA', deporte:'🏃 Atletismo', agregado:false },
];

var colores = ['#16a34a','#0284c7','#7c3aed','#c2410c','#d97706'];

function render(lista) {
  var cont = document.getElementById('amigos-resultados');
  if (!lista.length) {
    cont.innerHTML = '<div class="empty-search"><div class="empty-search-icon">👤</div><p class="empty-search-title">No se encontraron usuarios</p><p class="empty-search-sub">Intenta con otro nombre</p></div>';
    return;
  }
  cont.innerHTML = lista.map(function(u, i) {
    var color = colores[i % colores.length];
    return '<div style="display:flex;align-items:center;gap:14px;padding:14px;background:#fff;border-radius:14px;border:1px solid #E5E7EB;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">'
      + '<div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,' + color + ',' + color + '99);display:flex;align-items:center;justify-content:center;font-family:Sora,sans-serif;font-weight:700;color:#fff;font-size:0.9rem;flex-shrink:0">' + u.iniciales + '</div>'
      + '<div style="flex:1;min-width:0">'
      + '<div style="font-weight:700;font-size:0.95rem;color:#1A1A1A">' + u.nombre + '</div>'
      + '<div style="font-size:0.78rem;color:#9CA3AF">' + u.username + ' · ' + u.deporte + '</div>'
      + '</div>'
      + '<button onclick="toggleAmigo(' + u.id + ')" style="padding:7px 16px;border-radius:50px;border:' + (u.agregado ? 'none' : '1.5px solid #1ea1db') + ';background:' + (u.agregado ? '#F3F4F6' : '#fff') + ';color:' + (u.agregado ? '#9CA3AF' : '#1ea1db') + ';font-family:\'DM Sans\',sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;flex-shrink:0">'
      + (u.agregado ? '✓ Agregado' : 'Agregar') + '</button>'
      + '</div>';
  }).join('');
}

window.toggleAmigo = function(id) {
  var u = MOCK_USUARIOS.find(function(x) { return x.id === id; });
  if (u) { u.agregado = !u.agregado; filtrar(); }
};

function filtrar() {
  var q = document.getElementById('amigo-search').value.toLowerCase().trim();
  render(q ? MOCK_USUARIOS.filter(function(u) { return u.nombre.toLowerCase().includes(q) || u.username.toLowerCase().includes(q); }) : MOCK_USUARIOS);
}

document.addEventListener('DOMContentLoaded', function() {
  render(MOCK_USUARIOS);
  document.getElementById('amigo-search').addEventListener('input', filtrar);
  document.getElementById('topbar-menu').addEventListener('click', function() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('visible');
    document.body.style.overflow = 'hidden';
  });
  document.getElementById('sidebar-overlay').addEventListener('click', function() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('visible');
    document.body.style.overflow = '';
  });
});
</script>
</body>
</html>
