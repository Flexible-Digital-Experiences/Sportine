<!DOCTYPE html>
<html lang="es">
<head>

        <span class="nav-label">Home</span>
      </a>
      <a href="buscar.html" class="nav-item active" data-section="buscar">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <span class="nav-label">Buscar entrenador</span>
      </a>
      <a href="estadisticas.html" class="nav-item" data-section="estadisticas">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
        <span class="nav-label">Estadísticas</span>
      </a>
      <a href="social.html" class="nav-item" data-section="social">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
        <span class="nav-label">Social</span>
      </a>
      <a href="perfil.html" class="nav-item" data-section="perfil">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <span class="nav-label">Perfil</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-chip-avatar" id="sidebar-avatar">C</div>
        <div class="user-chip-info">
          <span class="user-chip-name" id="sidebar-name">Carlos Ramírez</span>
          <span class="user-chip-role">Alumno</span>
        </div>
        <button class="logout-btn" id="btn-logout" title="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

  <!-- MAIN -->
  <main class="main-content">
    <header class="topbar">
      <button class="topbar-menu" id="topbar-menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-logo"><div class="logo-mark">S</div><span class="logo-text">Sportine</span></div>
      <div class="topbar-avatar" id="topbar-avatar">C</div>
    </header>

    <!-- Header -->
    <div class="page-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <h1 class="page-title">Buscar Entrenadores</h1>
        <button class="social-icon-btn" id="btn-ver-solicitudes" title="Mis solicitudes" style="position:static">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
      </div>
      <div class="page-divider"></div>
    </div>

    <!-- SearchView -->
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="search-input" placeholder="Buscar por nombre o deporte..." autocomplete="off" />
    </div>

    <!-- Sección título dinámico -->
    <p class="section-title-lg" id="seccion-titulo">Entrenadores recomendados</p>

    <!-- Lista de entrenadores -->
    <div id="lista-entrenadores">
      <!-- Generado por JS -->
    </div>

    <!-- Estado vacío -->
    <div class="empty-search" id="empty-state" style="display:none">
      <div class="empty-search-icon">🔍</div>
      <p class="empty-search-title">No se encontraron entrenadores</p>
      <p class="empty-search-sub">Intenta buscar por nombre o deporte</p>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="home.html" class="bn-item" data-section="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="buscar.html" class="bn-item active" data-section="buscar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Buscar</span>
    </a>
    <a href="estadisticas.html" class="bn-item" data-section="estadisticas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Stats</span>
    </a>
    <a href="social.html" class="bn-item" data-section="social">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Social</span>
    </a>
    <a href="perfil.html" class="bn-item" data-section="perfil">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Perfil</span>
    </a>
