spring.application.name=sportine_backend

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/sportine_db
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.connectionProperties=useSSL=false;allowPublicKeyRetrieval=true;

# ConfiguraciÃÂ³n de JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

# ConfiguraciÃÂ³n del TransactionManager
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# PAYPAL CONFIGURATION
# ============================================

# Credenciales de PayPal
paypal.client-id=${PAYPAL_CLIENT_ID}
paypal.client-secret=${PAYPAL_CLIENT_SECRET}
paypal.mode=sandbox

# Partner Merchant ID (tu ID de PayPal como partner)
# Lo obtienes de: https://developer.paypal.com/dashboard/applications/live
# En sandbox serÃÂ¡ algo como: sb-xxxxx@business.example.com o un ID alfanumÃÂ©rico
paypal.partner-merchant-id=${PAYPAL_PARTNER_MERCHANT_ID}

# ============================================
# SPORTINE CONFIGURATION
# ============================================

# URL base de tu backend (cambiar en producciÃÂ³n)
SPORTINE_BASE_URL=https://sportine-production.up.railway.app
# URL de Live Server donde estÃ¡n los HTMLs del frontend
sportine.frontend-url=http://localhost:5500

# Porcentaje de comisiÃÂ³n de Sportine (10% por defecto)
sportine.comision-porcentaje=10.00

# ============================================
# PAYPAL WEBHOOKS
# ============================================

# Webhook ID (lo obtendrÃÂ¡s despuÃÂ©s de configurar webhooks en PayPal Dashboard)
paypal.webhook-id=${PAYPAL_WEBHOOK_ID:PENDIENTE}

# ============================================
# SCHEDULER CONFIGURATION
# ============================================

# Habilitar scheduling
spring.task.scheduling.pool.size=5
server.address=0.0.0.0


